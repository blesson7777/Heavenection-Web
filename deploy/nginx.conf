server {
    listen 80;
    listen [::]:80;
    server_name heavenection.com www.heavenection.com;

    root /srv/heavenection-web/current;
    index index.html;

    location /_next/static/ {
        try_files $uri =404;
        access_log off;
        expires 7d;
    }

    location / {
        try_files $uri $uri.html $uri/ =404;
    }
}
