server {
    listen 80;
    listen [::]:80;
    server_name heavenection.com www.heavenection.com;

    root /srv/heavenection-web/current;

    location /.well-known/acme-challenge/ {
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name heavenection.com www.heavenection.com;

    ssl_certificate /etc/letsencrypt/live/heavenection.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/heavenection.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /srv/heavenection-web/current;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /_next/static/ {
        try_files $uri =404;
        access_log off;
        expires 7d;
    }

    location / {
        try_files $uri $uri.html $uri/ =404;
    }
}
